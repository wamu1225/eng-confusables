<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="13" fill="#2f4b7c"/>
  <!-- 逆引き＝さがすを象徴する虫眼鏡。レンズ内に小さな a/b（似た文字）を置く -->
  <text x="20" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">a</text>
  <text x="31" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" fill="#9db4d8" text-anchor="middle">b</text>
  <circle cx="26" cy="26" r="15" fill="none" stroke="#ffffff" stroke-width="3.5"/>
  <line x1="37" y1="37" x2="50" y2="50" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
</svg>
